<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>PathCraft - Portfolio</title>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-md p-4 text-blue-600 font-bold">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html">PathCraft</a>
            <div class="space-x-6 text-gray-800 font-normal">
                <a href="index.html">Accueil</a>
                <a href="a-propos.html">À propos</a>
                <a href="portfolio.html" class="text-blue-600 font-semibold">Portfolio</a>
            </div>
        </div>
    </nav>

    <section class="container mx-auto py-12 px-4">
        <h2 class="text-3xl font-bold text-center mb-12">Mes Projets</h2>
        <!-- Grille de Projets -->
        <div class="grid md:grid-cols-3 gap-6 mb-20">
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="h-40 bg-gray-200 flex items-center justify-center text-gray-500">Image Projet 1</div>
                <div class="p-4">
                    <h3 class="font-bold text-xl mb-2">Projet PathCraft</h3>
                    <p class="text-sm text-gray-600 mb-4">Création d'un portfolio dynamique avec HTML/CSS/JS.</p>
                    <button class="bg-blue-600 text-white px-4 py-2 rounded text-sm">En savoir plus</button>
                </div>
            </div>
            <!-- Répéter pour d'autres projets -->
        </div>

        <!-- Formulaire de Contact -->
        <div class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold mb-6 text-center">Me Contacter</h2>
            <form id="contactForm" class="space-y-4">
                <input type="text" placeholder="Nom" class="w-full p-3 border rounded focus:ring-2 focus:ring-blue-600" required>
                <input type="email" placeholder="Email" class="w-full p-3 border rounded focus:ring-2 focus:ring-blue-600" required>
                <textarea placeholder="Message" class="w-full p-3 border rounded h-32 focus:ring-2 focus:ring-blue-600" required></textarea>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700 transition">Envoyer</button>
            </form>
            <p id="successMessage" class="hidden text-green-600 mt-4 text-center font-bold">Message envoyé avec succès !</p>
        </div>
    </section>

    <script>
        // Interaction basique pour le formulaire (Objectif JS)
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            this.classList.add('hidden');
            document.getElementById('successMessage').classList.remove('hidden');
        });
    </script>
</body>
</html>
